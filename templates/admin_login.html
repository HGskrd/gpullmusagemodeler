<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Admin</title>
<style>
  body { font-family: "IBM Plex Sans", sans-serif; margin: 0; background: #f3f1ec; color: #1d1c19; }
  .shell { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .card { width: min(420px, 100%); background: #fffdf8; border: 1px solid #d8d0c1; border-radius: 14px; padding: 22px; box-shadow: 0 16px 48px rgba(36, 31, 24, 0.08); }
  h1 { margin: 0 0 8px; font-size: 24px; }
  p { margin: 0 0 18px; color: #655e51; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  input { width: 100%; box-sizing: border-box; border: 1px solid #cfc5b3; border-radius: 10px; padding: 11px 12px; font-size: 15px; background: #ffffff; }
  button { margin-top: 14px; width: 100%; border: 0; border-radius: 10px; padding: 11px 14px; font-size: 15px; font-weight: 600; background: #2a6d57; color: #fff; cursor: pointer; }
  .error { margin-bottom: 12px; color: #b1382f; font-size: 13px; }
</style>
</head>
<body>
  <div class="shell">
    <form class="card" method="post" action="/admin/login">
      <h1>Planner Admin</h1>
      <p>Password-protected snapshot viewer.</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Open Admin</button>
    </form>
  </div>
</body>
</html>
