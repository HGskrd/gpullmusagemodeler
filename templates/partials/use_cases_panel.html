{# Use cases panel — parallels the Models panel #}
<div class="panel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
    <h2 style="margin:0;">Use cases</h2>
    <div class="flex" style="gap:6px;">
      <a href="{{ url_for('use_cases') }}"
         style="font-family:var(--sans);font-size:9px;font-weight:500;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:2px 5px;color:var(--fg0);text-decoration:none;white-space:nowrap;"
         title="Edit use-case definitions">
        Edit definitions
      </a>
      <div class="picker-wrap">
        <button class="acc sm" data-picker="project" onclick="togglePicker(this, '/picker/project?panel={{ panel }}')">+ Add use case</button>
      </div>
    </div>
  </div>
  {% if state.projects %}
  <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(230px,1fr));">
    {% for proj in state.projects %}
      {% include "partials/project_card.html" %}
    {% endfor %}
  </div>
  {% else %}
  <div class="T" style="padding:8px 2px;">No use cases yet. Add one to see how your deployment serves demand.</div>
  {% endif %}
</div>
